<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCP Servers Dashboard</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap">
  <link rel="stylesheet" href="/assets/css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌐</text></svg>">
</head>
<body>
  <!-- Status messages container -->
  <div id="status-messages"></div>
  
  <div class="container">
    <header>
      <div class="logo">
        <h1>MCP Servers Dashboard</h1>
        <p>Model Context Protocol Server Infrastructure</p>
      </div>
      
      <div class="header-actions">
        <button id="refresh-btn" title="Refresh server status">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
          </svg>
          <span>Refresh</span>
        </button>
      </div>
    </header>

    <div class="server-grid" id="servers-container">
      <!-- Server cards will be inserted here by JavaScript -->
      <div class="server-card">
        <div class="server-header">
          <div class="server-name">Loading servers...</div>
          <div class="server-status">
            <span class="loading"></span> Checking
          </div>
        </div>
      </div>
    </div>

    <footer>
      <p>&copy; 2025 Berry Development, LLC. All rights reserved.</p>
    </footer>
  </div>

  <script src="/assets/js/main.js"></script>
</body>
</html>
